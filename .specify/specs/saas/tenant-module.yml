            key_pattern: "public:plans"

    - controller: "TenantsAdminController"
      prefix: "/api/v1/admin/tenants"
      auth: "required"
      tenant_isolation: false
      description: "Endpoints administrativos (SYS_ADMIN) para gestão global de tenants"

      endpoints:
        - method: "GET"
          path: "/"
          summary: "Listar todos os tenants"
          operation_id: "listAllTenants"
          dto: "TenantFilterDto"
