  # ── APIs ──────────────────────────────────────────────────────────────────

  apis:

    - controller: "TenantsPublicController"
      prefix: "/api/v1/tenants"
      auth: "none"
      tenant_isolation: false
      description: "Endpoints públicos para autoatendimento (registro e verificação)"

      endpoints:
        - method: "POST"
          path: "/register"
          summary: "Registrar novo tenant (self-service)"
          operation_id: "registerTenant"
          dto: "RegisterTenantDto"
          response: "TenantRegistrationResponseDto"
          response_status: 201
          idempotent: true
          rate_limit:
            by: "ip"
            max: 3
            window: "3600s"
          audit: "TENANT_REGISTERED"

        - method: "GET"
          path: "/check-slug"
          summary: "Verificar disponibilidade de slug"
          operation_id: "checkSlugAvailability"
          dto: "CheckSlugDto"
          response: "SlugAvailabilityDto"
          response_status: 200

        - method: "GET"
          path: "/plans"
          summary: "Listar planos públicos disponíveis"
          operation_id: "listPublicPlans"
          response: "PlanResponseDto[]"
          response_status: 200
          cache:
