# =============================================================================
# BIDFLOW PLATFORM — Spec: Módulo de Licitações Core (Tendering)
# =============================================================================
# Especificação completa do núcleo operacional de gestão de licitações
# públicas e privadas. Abrange todo o ciclo: captura, análise, viabilidade,
# documentação, proposta, disputa, resultado e pós-licitação.
# Schema version: 1.0 | Spec-Driven Development
# =============================================================================

spec:
  # ── Metadados ────────────────────────────────────────────────────────────
  id: "bidflow-tender-001"
  title: "Módulo de Licitações Core (Tendering)"
  version: "1.0.0"
  status: draft
  context: "tender"
  author: "Architecture Board"
  created: "2026-05-15"
  updated: "2026-05-15"

  tags:
    - "tender"
    - "core-domain"
    - "multi-tenant"
    - "event-driven"
    - "workflow-integrated"

  # ── Dependências ─────────────────────────────────────────────────────────
  depends_on:
    specs:
      - "bidflow-auth-001"
      - "bidflow-tenant-001"
      - "bidflow-wf-001"
    services:
      - "postgres"
      - "redis"
      - "rabbitmq"
    apis:
      - name: "Workflow Engine API"
        version: "v1"
        contract: ".specify/specs/workflow/workflow-engine.yml"

  # ── Visão Geral ──────────────────────────────────────────────────────────
  overview: |
    ## Descrição
    Módulo core de licitações do BidFlow Platform. Gerencia o ciclo de vida
    completo de licitações públicas e privadas: desde a captura do edital até
    o pós-licitação (resultado, recursos, contrato).

    O módulo é integrado nativamente ao Workflow Engine: cada licitação possui
    um workflow configurável que define estágios, aprovações, tarefas e
    deadlines. A integração permite que cada tenant customize o fluxo sem
    desenvolvimento.

    ## Objetivos de Negócio
    1. Capturar licitações de múltiplas fontes (DOU, sites, API, manual)
    2. Analisar viabilidade técnica e econômica
    3. Gerenciar documentação obrigatória com checklist e validação
    4. Preparar propostas técnicas e comerciais
    5. Participar de disputas eletrônicas em tempo real
    6. Acompanhar resultados, recursos e contratos

    ## Critérios de Sucesso
    - Captura de edital < 5 min (automático)
    - Checklist de documentos com 100% de rastreabilidade
    - Proposta gerada em < 30 min
    - Disputa eletrônica com latência < 500ms
    - Integração com Workflow Engine em todo ciclo

  # ── Módulos ──────────────────────────────────────────────────────────────

  modules:

    - id: "tender-core"
      name: "Licitações Core"
      description: "Gestão do ciclo de vida completo de licitações"

      entities:

        # ─════════════════════════════════════════════════════════════════─
        # Aggregate Root: Tender
        # ─════════════════════════════════════════════════════════════════─

        - id: "Tender"
          name: "Licitação"
          description: |
            Representa uma licitação completa. Aggregate root do módulo.
            Gerencia o ciclo de vida desde a captura até o resultado final.
            Cada Tender possui um workflowInstanceId vinculado ao Workflow
            Engine, que controla os estágios de aprovação e tarefas.
          aggregate_root: true
          persistence:
            table: "tenders"
            indexes:
              - fields: ["tenant_id", "external_id"]
                unique: true
              - fields: ["tenant_id", "status"]
              - fields: ["tenant_id", "modality"]
              - fields: ["tenant_id", "uf"]
              - fields: ["tenant_id", "opening_date"]
              - fields: ["tenant_id", "closing_date"]
              - fields: ["tenant_id", "created_at"]
            soft_delete: true

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenantId"
              type: "uuid"
              required: true
              immutable: true

            - name: "externalId"
              type: "string"
              required: false
              max_length: 100
              description: "ID externo da licitação (DOU, site gov)"
              example: "DOU-2026-0012345"

            - name: "source"
              type: "enum"
              required: true
              default: "MANUAL"
              values:
                - "DOU"
                - "COMPRASNET"
                - "BEC"
                - "LICITACOES_JSON"
                - "API"
                - "MANUAL"
                - "IMPORT"
              description: "Fonte de captura da licitação"

            - name: "number"
              type: "string"
              required: true
              max_length: 50
              description: "Número da licitação"
              example: "001/2026"

            - name: "organization"
              type: "string"
              required: true
              max_length: 255
              description: "Órgão/entidade promotora"
              example: "Prefeitura Municipal de São Paulo"

            - name: "department"
              type: "string"
              required: false
              max_length: 255
              description: "Departamento/unidade"

            - name: "modality"
              type: "enum"
              required: true
              values:
                - "PREGAO_ELETRONICO"
                - "PREGAO_PRESENCIAL"
                - "CONCORRENCIA"
                - "TOMADA_PRECOS"
                - "CONVITE"
                - "CONCURSO"
                - "LEILAO"
                - "RDC"
                - "DISPENSA"
                - "INEXIGIBILIDADE"
              description: "Modalidade da licitação"

            - name: "type"
              type: "enum"
              required: true
              default: "MENOR_PRECO"
              values:
                - "MENOR_PRECO"
                - "MAIOR_DESCONTO"
                - "MELHOR_TECNICA"
                - "TECNICA_PRECO"
                - "MAIOR_LANCE"
                - "MAIOR_OFERTA"

            - name: "status"
              type: "enum"
              required: true
              default: "CAPTURED"
              values:
                - "CAPTURED"
                - "ANALYZING"
                - "VIABILITY_ANALYSIS"
                - "DOCUMENTATION"
                - "APPROVAL"
                - "PROPOSAL"
                - "SUBMITTED"
                - "DISPUTE"
                - "RESULT_AWAITED"
                - "WON"
                - "LOST"
                - "APPEAL"
                - "CONTRACTED"
                - "CANCELLED"
                - "ARCHIVED"

            - name: "title"
              type: "string"
              required: true
              max_length: 500
              description: "Objeto da licitação"
              example: "Aquisição de Equipamentos de TI para Datacenter"

            - name: "description"
              type: "text"
              required: false

            - name: "uf"
              type: "string"
              required: false
              max_length: 2
              description: "UF do órgão"
              example: "SP"

            - name: "city"
              type: "string"
              required: false
              max_length: 100

            - name: "estimatedValue"
              type: "decimal"
              required: false
              precision: 14
              scale: 2
              description: "Valor estimado da licitação"

            - name: "currency"
              type: "string"
              required: true
              default: "BRL"

            - name: "openingDate"
              type: "datetime"
              required: true
              description: "Data de abertura das propostas"

            - name: "closingDate"
              type: "datetime"
              required: true
              description: "Data de fechamento"

            - name: "disputeDate"
              type: "datetime"
              required: false
              description: "Data da disputa eletrônica"

            - name: "publicationDate"
              type: "date"
              required: false
              description: "Data de publicação do edital"

            - name: "documentUrl"
              type: "string"
              required: false
              max_length: 1000
              description: "URL do edital original"

            - name: "workflowInstanceId"
              type: "uuid"
              required: false
              description: "Instância do Workflow Engine associada"

            - name: "assignedTo"
              type: "uuid"
              required: false
              description: "Responsável pela licitação"

            - name: "assignedTeam"
              type: "json"
              required: false
              description: "Equipe responsável"
              example: '{"analyst": "uuid", "coordinator": "uuid", "reviewer": "uuid"}'

            - name: "tags"
              type: "json"
              required: false
              default: "[]"
              example: '["urgente", "alto-valor", "governo-federal"]'

            - name: "metadata"
              type: "json"
              required: false
              default: "{}"
              example: '{"siasgCode": "123456", "pddeCode": "2026-001"}'

            - name: "customFields"
              type: "json"
              required: false
              default: "{}"

            - name: "notes"
              type: "text"
              required: false

            - name: "deletedAt"
              type: "datetime"
              required: false

            - name: "createdBy"
              type: "uuid"
              required: true

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

            - name: "updatedAt"
              type: "datetime"
              required: true
              default: "now()"

          invariants:
            - "closingDate deve ser posterior a openingDate"
            - "externalId é único dentro do tenant"
            - "status WON exige pelo menos 1 TenderResult com resultado vencedor"
            - "status PROPOSAL exige pelo menos 1 TenderProposal"
            - "disputeDate deve ser posterior a closingDate"
            - "workflowInstanceId é vinculado ao Workflow Engine na transição para ANALYSIS"

          relationships:
            - type: "has_many"
              entity: "TenderItem"
              via: "tenderId"

            - type: "has_many"
              entity: "TenderDocument"
              via: "tenderId"

            - type: "has_many"
              entity: "TenderParticipation"
              via: "tenderId"

            - type: "has_many"
              entity: "TenderProposal"
              via: "tenderId"

            - type: "has_many"
              entity: "TenderChecklist"
              via: "tenderId"

            - type: "has_many"
              entity: "TenderDeadline"
              via: "tenderId"

            - type: "has_one"
              entity: "TenderResult"
              via: "tenderId"

            - type: "has_one"
              entity: "TenderDispute"
              via: "tenderId"

            - type: "has_many"
              entity: "TenderTimelineEntry"
              via: "tenderId"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderItem
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderItem"
          name: "Item da Licitação"
          description: "Item individual dentro de uma licitação. Uma licitação pode ter N itens."
          aggregate_root: false
          persistence:
            table: "tender_items"
            indexes:
              - fields: ["tender_id", "number"]
                unique: true
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "number"
              type: "integer"
              required: true
              description: "Número do item no edital"

            - name: "description"
              type: "text"
              required: true
              description: "Descrição do item"

            - name: "quantity"
              type: "decimal"
              required: true
              precision: 12
              scale: 4

            - name: "unit"
              type: "string"
              required: true
              max_length: 50
              example: "UN | KG | LOTE | SERVICO"

            - name: "estimatedValue"
              type: "decimal"
              required: false
              precision: 14
              scale: 2

            - name: "proposalValue"
              type: "decimal"
              required: false
              precision: 14
              scale: 2
              description: "Valor proposto"

            - name: "bidValue"
              type: "decimal"
              required: false
              precision: 14
              scale: 2
              description: "Valor da disputa"

            - name: "category"
              type: "string"
              required: false
              max_length: 100

            - name: "specifications"
              type: "json"
              required: false
              description: "Especificações técnicas"
              example: '{"brand": "Dell", "model": "PowerEdge R740", "warranty": 36}'

            - name: "hasDispute"
              type: "boolean"
              required: true
              default: false
              description: "Item participa da disputa eletrônica"

            - name: "winner"
              type: "boolean"
              required: false
              description: "Item vencido na licitação"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderDocument
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderDocument"
          name: "Documento da Licitação"
          description: |
            Documento anexado à licitação. Pode ser edital, anexo, proposta,
            certidão, etc. Possui versionamento, categoria, validação e
            associação ao checklist.
          aggregate_root: false
          persistence:
            table: "tender_documents"
            indexes:
              - fields: ["tender_id", "category"]
              - fields: ["tender_id", "checklist_item_id"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "checklistItemId"
              type: "uuid"
              required: false
              description: "Item do checklist ao qual este documento atende"

            - name: "category"
              type: "enum"
              required: true
              values:
                - "EDITAL"
                - "ANNEX"
                - "PROPOSAL"
                - "TECHNICAL_DOC"
                - "LEGAL_DOC"
                - "FINANCIAL_DOC"
                - "REGULARITY_CERTIFICATE"
                - "BALANCE_SHEET"
                - "CONTRACT"
                - "OTHER"

            - name: "title"
              type: "string"
              required: true
              max_length: 300

            - name: "description"
              type: "text"
              required: false

            - name: "fileName"
              type: "string"
              required: true
              max_length: 500

            - name: "fileSize"
              type: "integer"
              required: true
              description: "Tamanho em bytes"

            - name: "fileType"
              type: "string"
              required: true
              max_length: 50
              example: "application/pdf"

            - name: "fileUrl"
              type: "string"
              required: true
              max_length: 2000
              description: "URL do arquivo no storage"

            - name: "version"
              type: "integer"
              required: true
              default: 1
              description: "Versão do documento"

            - name: "isLatest"
              type: "boolean"
              required: true
              default: true

            - name: "status"
              type: "enum"
              required: true
              default: "PENDING"
              values:
                - "PENDING"
                - "VALIDATED"
                - "REJECTED"
                - "REPLACED"

            - name: "validatedBy"
              type: "uuid"
              required: false

            - name: "validatedAt"
              type: "datetime"
              required: false

            - name: "rejectionReason"
              type: "string"
              required: false
              max_length: 500

            - name: "uploadedBy"
              type: "uuid"
              required: true

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

          invariants:
            - "status REPLACED exige versão > 1"
            - "status VALIDATED exige validatedBy e validatedAt"
            - "status REJECTED exige rejectionReason"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderChecklist
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderChecklist"
          name: "Checklist da Licitação"
          description: |
            Item de checklist operacional. Cada licitação possui N itens
            de checklist que devem ser cumpridos antes de avançar no
            workflow. Pode ser automático (gerado pelo sistema) ou manual.
          aggregate_root: false
          persistence:
            table: "tender_checklists"
            indexes:
              - fields: ["tender_id", "status"]
              - fields: ["tender_id", "assigned_to"]
              - fields: ["tender_id", "category"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "category"
              type: "enum"
              required: true
              default: "DOCUMENTATION"
              values:
                - "DOCUMENTATION"
                - "LEGAL"
                - "TECHNICAL"
                - "FINANCIAL"
                - "OPERATIONAL"
                - "APPROVAL"
                - "POST_TENDER"

            - name: "title"
              type: "string"
              required: true
              max_length: 300
              example: "Certidão Negativa de Débitos Federais"

            - name: "description"
              type: "text"
              required: false

            - name: "status"
              type: "enum"
              required: true
              default: "PENDING"
              values:
                - "PENDING"
                - "IN_PROGRESS"
                - "COMPLETED"
                - "WAIVED"
                - "NOT_APPLICABLE"

            - name: "isMandatory"
              type: "boolean"
              required: true
              default: true
              description: "Se true, bloqueia avanço no workflow"

            - name: "order"
              type: "integer"
              required: true
              default: 0

            - name: "assignedTo"
              type: "uuid"
              required: false

            - name: "completedAt"
              type: "datetime"
              required: false

            - name: "completedBy"
              type: "uuid"
              required: false

            - name: "notes"
              type: "text"
              required: false

            - name: "autoGenerated"
              type: "boolean"
              required: true
              default: false

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

            - name: "updatedAt"
              type: "datetime"
              required: true
              default: "now()"

        # ─════════════════════════════════════════════════════════════════─
        # Aggregate Root: TenderProposal
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderProposal"
          name: "Proposta"
          description: |
            Proposta comercial e técnica para a licitação. Uma licitação
            pode ter múltiplas versões de proposta. A versão submetida é
            a final. Cada proposta contém valores por item e anexos.
          aggregate_root: true
          persistence:
            table: "tender_proposals"
            indexes:
              - fields: ["tender_id", "version"]
                unique: true
              - fields: ["tender_id", "is_submitted"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "version"
              type: "integer"
              required: true
              default: 1

            - name: "isSubmitted"
              type: "boolean"
              required: true
              default: false
              description: "Proposta final submetida"

            - name: "submittedAt"
              type: "datetime"
              required: false

            - name: "submittedBy"
              type: "uuid"
              required: false

            - name: "totalValue"
              type: "decimal"
              required: true
              precision: 14
              scale: 2

            - name: "discountPercent"
              type: "decimal"
              required: false
              precision: 5
              scale: 2

            - name: "technicalProposal"
              type: "json"
              required: false
              description: "Proposta técnica em formato livre"
              example: '{"methodology": "...", "team": [], "experience": []}'

            - name: "commercialProposal"
              type: "json"
              required: false
              description: "Detalhes comerciais"
              example: '{"paymentTerms": "30 dias", "warranty": 12}'

            - name: "observations"
              type: "text"
              required: false

            - name: "signature"
              type: "json"
              required: false
              description: "Assinatura digital"
              example: '{"type": "digital", "hash": "sha256-...", "signedBy": "uuid"}'

            - name: "createdBy"
              type: "uuid"
              required: true

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

            - name: "updatedAt"
              type: "datetime"
              required: true
              default: "now()"

          invariants:
            - "isSubmitted = true bloqueia alterações na proposta"
            - "totalValue deve ser >= 0"

          relationships:
            - type: "has_many"
              entity: "TenderItem"
              via: "tenderId"
              description: "Itens com valores da proposta"

        # ─════════════════════════════════════════════════════════════════─
        # Aggregate Root: TenderDispute
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderDispute"
          name: "Disputa Eletrônica"
          description: |
            Disputa eletrônica em tempo real. Registra lances, prorrogações
            e resultado. Integrada com WebSocket para atualização em
            tempo real. Suporta prorrogação automática.
          aggregate_root: true
          persistence:
            table: "tender_disputes"
            indexes:
              - fields: ["tender_id"]
                unique: true
              - fields: ["status"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true
              unique: true

            - name: "status"
              type: "enum"
              required: true
              default: "SCHEDULED"
              values:
                - "SCHEDULED"
                - "OPEN"
                - "EXTENDED"
                - "CLOSED"
                - "CANCELLED"

            - name: "startPrice"
              type: "decimal"
              required: true
              precision: 14
              scale: 2

            - name: "currentPrice"
              type: "decimal"
              required: true
              precision: 14
              scale: 2

            - name: "minDecrement"
              type: "decimal"
              required: true
              precision: 10
              scale: 2
              description: "Decremento mínimo entre lances"

            - name: "extensionTime"
              type: "integer"
              required: true
              default: 180
              description: "Prorrogação automática em segundos"

            - name: "startedAt"
              type: "datetime"
              required: false

            - name: "closedAt"
              type: "datetime"
              required: false

            - name: "winnerId"
              type: "uuid"
              required: false
              description: "Fornecedor vencedor"

            - name: "winnerAmount"
              type: "decimal"
              required: false
              precision: 14
              scale: 2

            - name: "totalBids"
              type: "integer"
              required: true
              default: 0

            - name: "extensions"
              type: "integer"
              required: true
              default: 0

            - name: "metadata"
              type: "json"
              required: false
              default: "{}"

          invariants:
            - "currentPrice <= startPrice"
            - "minDecrement > 0"
            - "status OPEN exige startedAt"
            - "status CLOSED exige closedAt"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderDisputeBid (value type / child)
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderDisputeBid"
          name: "Lance da Disputa"
          description: "Lance individual dentro da disputa eletrônica"
          aggregate_root: false
          persistence:
            table: "tender_dispute_bids"
            indexes:
              - fields: ["dispute_id", "created_at"]
              - fields: ["dispute_id", "supplier_id"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "disputeId"
              type: "uuid"
              required: true

            - name: "supplierId"
              type: "uuid"
              required: true

            - name: "amount"
              type: "decimal"
              required: true
              precision: 14
              scale: 2

            - name: "previousAmount"
              type: "decimal"
              required: false
              precision: 14
              scale: 2

            - name: "isAutomatic"
              type: "boolean"
              required: true
              default: false

            - name: "isWinner"
              type: "boolean"
              required: false

            - name: "timestamp"
              type: "datetime"
              required: true
              default: "now()"

            - name: "round"
              type: "integer"
              required: true

        # ─════════════════════════════════════════════════════════════════─
        # Aggregate Root: TenderResult
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderResult"
          name: "Resultado"
          description: |
            Resultado oficial da licitação. Registra classificação,
            valores, fornecedores vencedores e dados de adjudicação.
          aggregate_root: true
          persistence:
            table: "tender_results"
            indexes:
              - fields: ["tender_id"]
                unique: true
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true
              unique: true

            - name: "status"
              type: "enum"
              required: true
              default: "PENDING"
              values:
                - "PENDING"
                - "CLASSIFIED"
                - "WINNER"
                - "LOSER"
                - "DISQUALIFIED"
                - "APPEAL"
                - "CONTRACTED"

            - name: "classification"
              type: "integer"
              required: false
              description: "Posição na classificação"

            - name: "totalScore"
              type: "decimal"
              required: false
              precision: 10
              scale: 2

            - name: "technicalScore"
              type: "decimal"
              required: false
              precision: 10
              scale: 2

            - name: "commercialScore"
              type: "decimal"
              required: false
              precision: 10
              scale: 2

            - name: "winnerValue"
              type: "decimal"
              required: false
              precision: 14
              scale: 2

            - name: "winnerName"
              type: "string"
              required: false
              max_length: 255

            - name: "winnerDocument"
              type: "string"
              required: false
              max_length: 20

            - name: "announcedAt"
              type: "datetime"
              required: false

            - name: "appealDeadline"
              type: "datetime"
              required: false

            - name: "contractSignedAt"
              type: "datetime"
              required: false

            - name: "observations"
              type: "text"
              required: false

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

            - name: "updatedAt"
              type: "datetime"
              required: true
              default: "now()"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderParticipation
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderParticipation"
          name: "Participação"
          description: "Registro de participação/fornecedor na licitação"
          aggregate_root: false
          persistence:
            table: "tender_participations"
            indexes:
              - fields: ["tender_id", "supplier_id"]
                unique: true
              - fields: ["tender_id", "status"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "supplierId"
              type: "uuid"
              required: true

            - name: "supplierName"
              type: "string"
              required: true
              max_length: 255

            - name: "supplierDocument"
              type: "string"
              required: true
              max_length: 20

            - name: "status"
              type: "enum"
              required: true
              default: "REGISTERED"
              values:
                - "REGISTERED"
                - "QUALIFIED"
                - "DISQUALIFIED"
                - "WITHDREW"
                - "WINNER"
                - "CONTRACTED"

            - name: "hasProposal"
              type: "boolean"
              required: true
              default: false

            - name: "bidCount"
              type: "integer"
              required: true
              default: 0

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderDeadline
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderDeadline"
          name: "Prazo"
          description: "Prazo/lembrete associado à licitação"
          aggregate_root: false
          persistence:
            table: "tender_deadlines"
            indexes:
              - fields: ["tender_id", "deadline_at"]
              - fields: ["tender_id", "type"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "type"
              type: "enum"
              required: true
              values:
                - "OPENING"
                - "CLOSING"
                - "DISPUTE"
                - "DOCUMENT_DEADLINE"
                - "APPEAL"
                - "CONTRACT_SIGNING"
                - "CUSTOM"

            - name: "title"
              type: "string"
              required: true
              max_length: 300

            - name: "deadlineAt"
              type: "datetime"
              required: true

            - name: "notifiedBefore"
              type: "integer"
              required: false
              description: "Notificar N dias antes"

            - name: "notifiedAt"
              type: "datetime"
              required: false

            - name: "status"
              type: "enum"
              required: true
              default: "PENDING"
              values:
                - "PENDING"
                - "NOTIFIED"
                - "COMPLETED"
                - "OVERDUE"

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

        # ─════════════════════════════════════════════════════════════════─
        # Entity: TenderTimelineEntry
        # ─════════════════════════════════════════════════════════════════─

        - id: "TenderTimelineEntry"
          name: "Entrada de Timeline"
          description: "Registro imutável de evento no ciclo de vida da licitação"
          aggregate_root: false
          persistence:
            table: "tender_timeline_entries"
            indexes:
              - fields: ["tender_id", "occurred_at"]
              - fields: ["tender_id", "type"]
            soft_delete: false

          attributes:
            - name: "id"
              type: "uuid"
              required: true

            - name: "tenderId"
              type: "uuid"
              required: true

            - name: "type"
              type: "enum"
              required: true
              values:
                - "CAPTURED"
                - "ANALYSIS_STARTED"
                - "VIABILITY_APPROVED"
                - "VIABILITY_REJECTED"
                - "DOCUMENT_UPLOADED"
                - "DOCUMENT_VALIDATED"
                - "DOCUMENT_REJECTED"
                - "CHECKLIST_COMPLETED"
                - "PROPOSAL_CREATED"
                - "PROPOSAL_SUBMITTED"
                - "DISPUTE_STARTED"
                - "DISPUTE_BID"
                - "DISPUTE_EXTENDED"
                - "DISPUTE_FINISHED"
                - "RESULT_PUBLISHED"
                - "WON"
                - "LOST"
                - "APPEAL_FILED"
                - "CONTRACT_SIGNED"
                - "TENDER_CANCELLED"
                - "STATUS_CHANGED"
                - "ASSIGNMENT_CHANGED"
                - "NOTE_ADDED"
                - "SYSTEM_EVENT"

            - name: "title"
              type: "string"
              required: true
              max_length: 300

            - name: "description"
              type: "text"
              required: false

            - name: "occurredAt"
              type: "datetime"
              required: true
              default: "now()"

            - name: "createdBy"
              type: "uuid"
              required: false

            - name: "metadata"
              type: "json"
              required: false
              default: "{}"

            - name: "createdAt"
              type: "datetime"
              required: true
              default: "now()"

          invariants:
            - "TimelineEntry é imutável (append-only)"

      # ── Value Objects ──────────────────────────────────────────────────

      value_objects:
        - id: "TenderModality"
          description: "Modalidade da licitação"
          attributes:
            - name: "type"
              type: "enum"
              values: ["PREGAO_ELETRONICO", "PREGAO_PRESENCIAL", "CONCORRENCIA", "TOMADA_PRECOS", "CONVITE", "CONCURSO", "LEILAO", "RDC", "DISPENSA", "INEXIGIBILIDADE"]
            - name: "isElectronic"
              type: "boolean"
              default: true

        - id: "TenderValue"
          description: "Valor monetário"
          attributes:
            - name: "amount"
              type: "decimal"
              precision: 14
              scale: 2
            - name: "currency"
              type: "string"
              default: "BRL"

  # ── Regras de Negócio ─────────────────────────────────────────────────────

  business_rules:
    - id: "TND-BR-001"
      title: "Datas consistentes"
      description: "closingDate deve ser posterior a openingDate"
      scope: "Tender"
      type: "hard"
      error_code: "INVALID_DATES"

    - id: "TND-BR-002"
      title: "Proposta submetida é imutável"
      description: "Proposta com isSubmitted = true não pode ser alterada"
      scope: "TenderProposal"
      type: "hard"
      error_code: "PROPOSAL_ALREADY_SUBMITTED"

    - id: "TND-BR-003"
      title: "Disputa requer proposta"
      description: "Disputa eletrônica requer pelo menos 1 proposta submetida"
      scope: "TenderDispute"
      type: "hard"
      error_code: "NO_PROPOSAL_FOR_DISPUTE"

    - id: "TND-BR-004"
      title: "Decremento mínimo"
      description: "Lance na disputa deve ser inferior ao currentPrice em pelo menos minDecrement"
      scope: "TenderDisputeBid"
      type: "hard"
      error_code: "BID_BELOW_MIN_DECREMENT"

    - id: "TND-BR-005"
      title: "Checklist completo para proposta"
      description: "Checklist deve estar 100% completo antes de submeter proposta"
      scope: "Tender"
      type: "hard"
      error_code: "CHECKLIST_INCOMPLETE"

    - id: "TND-BR-006"
      title: "Valor total da proposta"
      description: "Soma dos itens deve corresponder ao totalValue da proposta"
      scope: "TenderProposal"
      type: "hard"
      error_code: "PROPOSAL_VALUE_MISMATCH"

    - id: "TND-BR-007"
      title: "Documento único por categoria/checklist"
      description: "Apenas 1 documento vigente por (tenderId, category, checklistItemId)"
      scope: "TenderDocument"
      type: "hard"
      error_code: "DUPLICATE_DOCUMENT"

  # ── Workflows ─────────────────────────────────────────────────────────────

  workflows:
    - id: "wf-tender-lifecycle"
      name: "Ciclo de Vida da Licitação"
      description: "Fluxo completo gerenciado pelo Workflow Engine"
      trigger: "Tender.status → CAPTURED"
      workflow_engine: true
      workflow_definition_slug: "tender-lifecycle"

      stages:
        - id: "CAPTURED"
          label: "Capturada"
          description: "Licitação capturada automaticamente ou manual"
          actions: ["START_ANALYSIS", "CANCEL"]

        - id: "ANALYZING"
          label: "Em Análise"
          description: "Analista revisa o edital"
          actions: ["APPROVE_VIABILITY", "REJECT_VIABILITY"]

        - id: "DOCUMENTATION"
          label: "Documentação"
          description: "Coleta e validação de documentos"
          actions: ["COMPLETE_DOCUMENTATION", "REQUEST_DOCUMENT"]

        - id: "APPROVAL"
          label: "Aprovação"
          description: "Aprovação interna para participação"
          actions: ["APPROVE", "REJECT"]
          approval_required: true

        - id: "PROPOSAL"
          label: "Proposta"
          description: "Elaboração da proposta"
          actions: ["SUBMIT_PROPOSAL", "REVIEW_PROPOSAL"]

        - id: "SUBMITTED"
          label: "Proposta Submetida"
          description: "Proposta enviada ao órgão"
          actions: ["ENTER_DISPUTE", "AWAIT_RESULT"]

        - id: "DISPUTE"
          label: "Disputa"
          description: "Disputa eletrônica em andamento"
          actions: ["PLACE_BID", "FINISH_DISPUTE"]

        - id: "RESULT"
          label: "Resultado"
          description: "Aguardando resultado"
          actions: ["REGISTER_WIN", "REGISTER_LOSS"]
          final: true

  # ── Eventos ───────────────────────────────────────────────────────────────

  events:
    - id: "evt-tender-captured"
      name: "TenderCaptured"
      description: "Nova licitação capturada"
      version: "v1"
      type: "com.bidflow.tender.captured.v1"
      routing_key: "{tenantId}.tender.captured"
      payload:
        eventId: { type: "uuid" }
        aggregateId: { type: "uuid" }
        tenantId: { type: "uuid" }
        timestamp: { type: "datetime" }
        data:
          type: "object"
          properties:
            tenderId: { type: "uuid" }
            number: { type: "string" }
            organization: { type: "string" }
            modality: { type: "string" }
            estimatedValue: { type: "decimal" }
            openingDate: { type: "datetime" }
            closingDate: { type: "datetime" }
      consumers:
        - service: "workflow-engine"
          handler: "startTenderWorkflow"
          async: true

    - id: "evt-tender-proposal-submitted"
      name: "TenderProposalSubmitted"
      description: "Proposta submetida"
      version: "v1"
      type: "com.bidflow.tender.proposal.submitted.v1"
      routing_key: "{tenantId}.tender.proposal.submitted"
      payload:
        eventId: { type: "uuid" }
        aggregateId: { type: "uuid" }
        tenantId: { type: "uuid" }
        timestamp: { type: "datetime" }
        data:
          type: "object"
          properties:
            tenderId: { type: "uuid" }
            proposalId: { type: "uuid" }
            totalValue: { type: "decimal" }

    - id: "evt-tender-dispute-bid"
      name: "TenderDisputeBidPlaced"
      description: "Lance registrado na disputa"
      version: "v1"
      type: "com.bidflow.tender.dispute.bid.v1"
      routing_key: "{tenantId}.tender.dispute.bid"
      payload:
        eventId: { type: "uuid" }
        aggregateId: { type: "uuid" }
        tenantId: { type: "uuid" }
        timestamp: { type: "datetime" }
        data:
          type: "object"
          properties:
            disputeId: { type: "uuid" }
            supplierId: { type: "uuid" }
            amount: { type: "decimal" }
            round: { type: "integer" }

    - id: "evt-tender-won"
      name: "TenderWon"
      description: "Licitação vencida"
      version: "v1"
      type: "com.bidflow.tender.won.v1"
      routing_key: "{tenantId}.tender.won"
      payload:
        eventId: { type: "uuid" }
        aggregateId: { type: "uuid" }
        tenantId: { type: "uuid" }
        timestamp: { type: "datetime" }
        data:
          type: "object"
          properties:
            tenderId: { type: "uuid" }
            winnerValue: { type: "decimal" }
            classification: { type: "integer" }
      consumers:
        - service: "crm"
          handler: "updateOpportunityPipeline"
          async: true

  # ── APIs ──────────────────────────────────────────────────────────────────

  apis:
    - controller: "TendersController"
      prefix: "/api/v1/tenders"
      auth: "required"
      tenant_isolation: true
      endpoints:
        - method: "POST"
          path: "/"
          summary: "Capturar nova licitação"
          operation_id: "captureTender"
          response_status: 201
          permissions: ["tender.create"]

        - method: "GET"
          path: "/"
          summary: "Listar licitações"
          operation_id: "listTenders"
          permissions: ["tender.read"]
          pagination: true
          filters:
            - "status"
            - "modality"
            - "uf"
            - "organization"
            - "search"
            - "date_from"
            - "date_to"

        - method: "GET"
          path: "/:id"
          summary: "Obter licitação com detalhes"
          operation_id: "getTender"
          permissions: ["tender.read"]

        - method: "PATCH"
          path: "/:id"
          summary: "Atualizar licitação"
          operation_id: "updateTender"
          permissions: ["tender.update"]

        - method: "POST"
          path: "/:id/transition"
          summary: "Transicionar status (via Workflow Engine)"
          operation_id: "transitionTenderStatus"
          permissions: ["tender.transition"]

        - method: "POST"
          path: "/:id/assign"
          summary: "Atribuir responsável"
          operation_id: "assignTender"
          permissions: ["tender.manage"]

    - controller: "TenderDocumentsController"
      prefix: "/api/v1/tenders/:tenderId/documents"
      auth: "required"
      endpoints:
        - method: "POST"
          path: "/"
          summary: "Upload de documento"
          operation_id: "uploadDocument"
          permissions: ["tender.document.upload"]

        - method: "GET"
          path: "/"
          summary: "Listar documentos"
          operation_id: "listDocuments"
          permissions: ["tender.read"]

        - method: "POST"
          path: "/:id/validate"
          summary: "Validar documento"
          operation_id: "validateDocument"
          permissions: ["tender.document.validate"]

        - method: "POST"
          path: "/:id/replace"
          summary: "Substituir documento (nova versão)"
          operation_id: "replaceDocument"
          permissions: ["tender.document.upload"]

    - controller: "TenderProposalsController"
      prefix: "/api/v1/tenders/:tenderId/proposals"
      auth: "required"
      endpoints:
        - method: "POST"
          path: "/"
          summary: "Criar proposta"
          operation_id: "createProposal"
          permissions: ["tender.proposal.create"]

        - method: "POST"
          path: "/:id/submit"
          summary: "Submeter proposta"
          operation_id: "submitProposal"
          permissions: ["tender.proposal.submit"]

        - method: "GET"
          path: "/"
          summary: "Listar versões de proposta"
          operation_id: "listProposals"
          permissions: ["tender.read"]

    - controller: "TenderChecklistsController"
      prefix: "/api/v1/tenders/:tenderId/checklist"
      auth: "required"
      endpoints:
        - method: "GET"
          path: "/"
          summary: "Listar checklist"
          operation_id: "listChecklist"
          permissions: ["tender.read"]

        - method: "PATCH"
          path: "/:id"
          summary: "Atualizar item do checklist"
          operation_id: "updateChecklistItem"
          permissions: ["tender.checklist.update"]

    - controller: "TenderDisputesController"
      prefix: "/api/v1/tenders/:tenderId/dispute"
      auth: "required"
      endpoints:
        - method: "GET"
          path: "/"
          summary: "Obter disputa"
          operation_id: "getDispute"

        - method: "POST"
          path: "/bid"
          summary: "Registrar lance"
          operation_id: "placeBid"
          permissions: ["tender.dispute.bid"]
          rate_limit:
            by: "user"
            max: 30
            window: "60s"

        - method: "GET"
          path: "/bids"
          summary: "Histórico de lances"
          operation_id: "listBids"

    - controller: "TenderTimelineController"
      prefix: "/api/v1/tenders/:tenderId/timeline"
      auth: "required"
      endpoints:
        - method: "GET"
          path: "/"
          summary: "Consultar timeline"
          operation_id: "getTenderTimeline"
          permissions: ["tender.read"]

  # ── Integração com Workflow Engine ─────────────────────────────────────

  workflow_integration:
    description: |
      Toda licitação (Tender) pode ter um workflow associado no Workflow Engine.
      A integração ocorre em 3 pontos:

      1. AO CRIAR: Tender cria WorkflowInstance no Workflow Engine
         - workflowDefinitionId = definição do tenant para "tender-lifecycle"
         - entityType = "tender.tender"
         - entityId = tender.id

      2. AO TRANSICIONAR: Tender.changelStatus() via Workflow Engine
         - Handler de transição atualiza Tender.status
         - Workflow Engine publica StageChangedEvent
         - Tender consome e atualiza status interno

      3. AO CONCLUIR: WorkflowCompletedEvent atualiza Tender
         - Se workflow concluído → Tender.status = último estágio

    events:
      published:
        - "evt-tender-captured"           → Workflow Engine: start workflow
        - "evt-tender-proposal-submitted" → Workflow Engine: advance stage
      consumed:
        - "com.bidflow.workflow.stage.changed.v1"    → Atualizar status
        - "com.bidflow.workflow.instance.completed.v1" → Finalizar

    status_mapping:
      workflowStage: "tender.status"
      "inicio": "CAPTURED"
      "analise": "ANALYZING"
      "viabilidade": "VIABILITY_ANALYSIS"
      "documentacao": "DOCUMENTATION"
      "aprovacao": "APPROVAL"
      "proposta": "PROPOSAL"
      "submetida": "SUBMITTED"
      "disputa": "DISPUTE"
      "resultado": "RESULT_AWAITED"
      "vencida": "WON"
      "perdida": "LOST"
      "cancelada": "CANCELLED"

  # ── Observabilidade ───────────────────────────────────────────────────────

  observability:
    logging:
      level: "info"
      format: "json"
      include: ["tenantId", "tenderId", "status", "modality", "duration_ms"]
      sensitive_fields: ["proposalValue", "notes"]

    metrics:
      - name: "bidflow_tenders_total"
        type: "counter"
        labels: ["tenant_id", "status", "modality"]

      - name: "bidflow_tenders_dispute_duration_seconds"
        type: "histogram"
        labels: ["tenant_id"]
        buckets: [60, 300, 600, 1800, 3600]

      - name: "bidflow_tenders_win_rate"
        type: "gauge"
        labels: ["tenant_id"]

    alerts:
      - name: "TenderClosingSoon"
        condition: "closingDate < now() + 24h AND status in (PROPOSAL, SUBMITTED)"
        severity: "warning"
      - name: "TenderOverdueChecklist"
        condition: "checklist with deadline < now() AND status = PENDING"
        severity: "warning"

  # ── Permissões ───────────────────────────────────────────────────────────

  permissions:
    roles:
      - id: "TENANT_ADMIN"
        policies: ["tender.*"]
      - id: "TENANT_MANAGER"
        policies: ["tender.create", "tender.update", "tender.transition", "tender.manage", "tender.proposal.*"]
      - id: "TENANT_VIEWER"
        policies: ["tender.read"]

    permission_catalog:
      - code: "tender.create"
        description: "Capturar licitações"
      - code: "tender.read"
        description: "Consultar licitações"
      - code: "tender.update"
        description: "Atualizar dados"
      - code: "tender.transition"
        description: "Avançar estágios"
      - code: "tender.manage"
        description: "Atribuir equipe"
      - code: "tender.document.upload"
        description: "Upload de documentos"
      - code: "tender.document.validate"
        description: "Validar documentos"
      - code: "tender.proposal.create"
        description: "Criar proposta"
      - code: "tender.proposal.submit"
        description: "Submeter proposta"
      - code: "tender.checklist.update"
        description: "Gerenciar checklist"
      - code: "tender.dispute.bid"
        description: "Dar lances na disputa"
