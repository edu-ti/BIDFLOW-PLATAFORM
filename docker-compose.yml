version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bidflow-postgres
    environment:
      POSTGRES_USER: bidflow
      POSTGRES_PASSWORD: bidflow_secret
      POSTGRES_DB: bidflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bidflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: bidflow-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bidflow:bidflow_secret@postgres:5432/bidflow_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: bidflow-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

  analytics:
    build:
      context: ./apps/analytics
      dockerfile: Dockerfile
    container_name: bidflow-analytics
    environment:
      PYTHON_ENV: development
      DATABASE_URL: postgresql://bidflow:bidflow_secret@postgres:5432/bidflow_db
      API_HOST: 0.0.0.0
      API_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: bidflow-network