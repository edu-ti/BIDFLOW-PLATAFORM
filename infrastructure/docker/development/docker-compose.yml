version: '3.9'

services:
  # ===========================================
  # DATABASE & MESSAGING
  # ===========================================

  postgres:
    image: postgres:16-alpine
    container_name: bidflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bidflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bidflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-bidflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/services/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - bidflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bidflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: bidflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - bidflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bidflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bidflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-bidflow_dev}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bidflow-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ===========================================
  # BACKEND SERVICES
  # ===========================================

  api-gateway:
    build:
      context: ../apps/api-gateway
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-bidflow-dev-secret-key-32-chars}
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: "http://localhost:3001"
      TENANT_RESOLUTION_STRATEGY: subdomain
    volumes:
      - ../apps/api-gateway/src:/app/src
    networks:
      - bidflow-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    command: pnpm run start:dev

  crm-service:
    build:
      context: ../apps/crm-service
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-crm-service
    ports:
      - "${CRM_SERVICE_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
    volumes:
      - ../apps/crm-service/src:/app/src
    networks:
      - bidflow-network
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm run start:dev

  erp-service:
    build:
      context: ../apps/erp-service
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-erp-service
    ports:
      - "${ERP_SERVICE_PORT:-3002}:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
    volumes:
      - ../apps/erp-service/src:/app/src
    networks:
      - bidflow-network
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm run start:dev

  bidding-service:
    build:
      context: ../apps/bidding-service
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-bidding-service
    ports:
      - "${BIDDING_SERVICE_PORT:-3003}:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - ../apps/bidding-service/src:/app/src
    networks:
      - bidflow-network
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm run start:dev

  workflow-service:
    build:
      context: ../apps/workflow-service
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-workflow-service
    ports:
      - "${WORKFLOW_SERVICE_PORT:-3004}:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
    volumes:
      - ../apps/workflow-service/src:/app/src
    networks:
      - bidflow-network
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm run start:dev

  saas-service:
    build:
      context: ../apps/saas-service
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-saas-service
    ports:
      - "${SAAS_SERVICE_PORT:-3005}:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
    volumes:
      - ../apps/saas-service/src:/app/src
    networks:
      - bidflow-network
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm run start:dev

  # ===========================================
  # AI SERVICE (Python FastAPI)
  # ===========================================

  ai-service:
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-ai-service
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://${POSTGRES_USER:-bidflow}:${POSTGRES_PASSWORD:-bidflow_dev}@postgres:5432/${POSTGRES_DB:-bidflow}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-bidflow}:${RABBITMQ_PASSWORD:-bidflow_dev}@rabbitmq:5672
      MODEL_CACHE_DIR: /app/models
      LOG_LEVEL: debug
    volumes:
      - ../apps/ai-service/src:/app/src
      - ai_models:/app/models
    networks:
      - bidflow-network
    depends_on:
      redis:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ===========================================
  # FRONTEND
  # ===========================================

  web-app:
    build:
      context: ../apps/web-app
      dockerfile: Dockerfile
      target: development
    container_name: bidflow-web-app
    ports:
      - "${WEB_APP_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://api-gateway:3000
      NEXT_PUBLIC_WS_URL: ws://api-gateway:3000
      NEXT_PUBLIC_TENANT_RESOLUTION: subdomain
    volumes:
      - ../apps/web-app/src:/app/src
      - ../apps/web-app/public:/app/public
    networks:
      - bidflow-network
    depends_on:
      - api-gateway
    command: pnpm run dev

  # ===========================================
  # NGINX REVERSE PROXY
  # ===========================================

  nginx:
    image: nginx:1.25-alpine
    container_name: bidflow-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - nginx_certs:/etc/nginx/certs
    networks:
      - bidflow-network
    depends_on:
      - api-gateway
      - web-app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  bidflow-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  ai_models:
  nginx_logs:
  nginx_certs: